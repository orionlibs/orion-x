server:
  port: 8100

spring:
  application:
    name: orion-account-organisation
  main:
    banner-mode: off
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/account-organisations}
    username: ${DB_USERNAME:local}
    password: ${DB_PASSWORD:local}
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
  jpa:
    database: postgresql
    show-sql: false
    generate-ddl: false
    hibernate:
      ddl-auto: validate

