spring:
  application:
    name: orion-ai-agent-cli
  config:
    import: optional:classpath:.env[.properties]
  main:
    web-application-type: none
    banner-mode: off
  shell:
    enabled: true
    interactive:
      enabled: true
    noninteractive:
      enabled: false
    history:
      enabled: true
    command:
      version:
        enabled: true

orion:
  ai:
    available-agents: ["Claude", "Gemini"]
  openrouter:
    api:
      key: ${openrouter.api.key}
      base-url: ${openrouter.api.base-url}
    ai:
      model-id: ${openrouter.ai.model-id}

